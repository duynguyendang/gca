steps:
  # Build and push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/gca-be', '-f', 'gca/Dockerfile', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/gca-be']

  # Deploy to Cloud Run with secret from Secret Manager
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gca-be'
      - '--image'
      - 'gcr.io/$PROJECT_ID/gca-be'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--memory'
      - '1Gi'
      - '--port'
      - '8080'
      - '--set-secrets'
      - 'LLM_API_KEY=GEMINI_KEY:latest'
      - '--set-env-vars'
      - 'LOW_MEM=true,LLM_MODEL=googleai/gemma-4-31b-it,LLM_PROVIDER=googleai,EMBEDDING_MODEL=googleai/gemini-embedding-001,CORS_ALLOW_ORIGINS=https://gca-hackathon.web.app'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/gca-be'

options:
  logging: CLOUD_LOGGING_ONLY